name: Build, Push & Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy code từ GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Đăng nhập Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build & Push image lên Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/demo-java:latest

      # 4. Triển khai lên DevOps Classroom (Cấu hình cho Slot 2)
      - name: Triển khai lên DevOps Classroom
        run: |
          # Thiết lập thông tin Repo dựa trên tên đăng nhập Docker của bạn
          REPO="${{ secrets.DOCKER_USERNAME }}/demo-java"
          
          # Theo ảnh hướng dẫn của ithutech, Slot 2 chạy app ở port 80
          CONTAINER_PORT=80

          # Gửi yêu cầu Webhook với slot=2
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=2&container_port=$CONTAINER_PORT&strict_container_port=0")

          # Tách nội dung phản hồi và mã trạng thái HTTP
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)

          echo "Webhook HTTP: $CODE"

          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại."
            echo "::group::Chi tiết lỗi từ máy chủ (JSON)"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi

          echo "Deploy thành công."
          echo "::group::Phản hồi chi tiết"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
